{% extends "layout.html" %}

{% block title %}New Contact{% endblock %}

{% block head %}{% endblock %}

{% block content %}
  <form action="/contacts/new" method="post">
    <fieldset>
      <legend>Contact Values</legend>
      <p>
        <label for="email">Email</label>
        <input name="email" id="email" type="email" value="{{ contact.email }}" />
        <span>{{ errors.email }}</span>
      </p>
      <p>
        <label for="first">First Name</label>
        <input name="first" id="first" type="text"
          placeholder="First Name" value="{{ contact.first }}">
        <span>{{ errors.first }}</span>
      </p>
      <p>
        <label for="last">Last Name</label>
        <input name="last" id="last" type="text"
          placeholder="Last Name" value="{{ contact.last }}">
        <span>{{ errors.last }}</span>
      </p>
      <p>
        <label for="phone">Phone</label>
        <input name="phone" id="phone" type="text" placeholder="Phone"
          value="{{ contact.phone }}">
        <span>{{ errors.phone }}</span>
      </p>
      <button>Save</button>
    </fieldset>
  </form>

  <a href="/contacts">Back</a>
{% endblock %}
